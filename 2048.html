<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 6px;
            width: 400px;
            height: 400px;
        }

        .cell {
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
        }

        .empty-cell {
            background-color: #cdc1b4;
            opacity: 0.7;
            border: 2px dashed rgba(0, 0, 0, 0.1);
        }

        .score-panel {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100">
    <h1 class="text-3xl font-bold mb-4">2048</h1>
    <div class="score-panel">Счёт: <span id="score">0</span></div>
    <div class="grid" id="grid"></div>
    <p class="mt-4 text-gray-600">Используйте стрелки для перемещения плиток.</p>

    <script>
        const grid = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        let score = 0;
        let board = Array(4).fill().map(() => Array(4).fill(0));

        // Инициализация игры
        function initGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreElement.textContent = score;
            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        // Добавление случайной плитки (2 или 4)
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({i, j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.i][randomCell.j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // Отрисовка игрового поля
        function renderBoard() {
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cellValue = board[i][j];
                    const cell = document.createElement('div');
                    cell.className = `cell ${cellValue === 0 ? 'empty-cell' : ''}`;
                    cell.textContent = cellValue !== 0 ? cellValue : '';
                    cell.style.backgroundColor = getCellColor(cellValue);
                    grid.appendChild(cell);
                }
            }
        }

        // Определение цвета плитки в зависимости от её значения
        function getCellColor(value) {
            const colors = {
                0: 'transparent',
                2: '#eee4da',
                4: '#ede0c8',
                8: '#f2b179',
                16: '#f59563',
                32: '#f67c5f',
                64: '#f65e3b',
                128: '#edcf72',
                256: '#edcc61',
                512: '#edc850',
                1024: '#edc53f',
                2048: '#edc22e',
            };
            return colors[value] || '#3c3a32';
        }

        // Обработка движения плиток
        function handleMove(direction) {
            let moved = false;
            switch (direction) {
                case 'up':
                    moved = moveUp();
                    break;
                case 'down':
                    moved = moveDown();
                    break;
                case 'left':
                    moved = moveLeft();
                    break;
                case 'right':
                    moved = moveRight();
                    break;
            }

            if (moved) {
                addRandomTile();
                renderBoard();
                if (isGameOver()) {
                    setTimeout(() => alert('Игра окончена!'), 100);
                }
            }
        }

        // Движение плиток вверх
        function moveUp() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                for (let i = 1; i < 4; i++) {
                    if (board[i][j] !== 0) {
                        let k = i;
                        while (k > 0 && board[k - 1][j] === 0) {
                            board[k - 1][j] = board[k][j];
                            board[k][j] = 0;
                            k--;
                            moved = true;
                        }
                        if (k > 0 && board[k - 1][j] === board[k][j]) {
                            board[k - 1][j] *= 2;
                            score += board[k - 1][j];
                            scoreElement.textContent = score;
                            board[k][j] = 0;
                            moved = true;
                        }
                    }
                }
            }
            return moved;
        }

        // Движение плиток вниз
        function moveDown() {
            let moved = false;
            for (let j = 0; j < 4; j++) {
                for (let i = 2; i >= 0; i--) {
                    if (board[i][j] !== 0) {
                        let k = i;
                        while (k < 3 && board[k + 1][j] === 0) {
                            board[k + 1][j] = board[k][j];
                            board[k][j] = 0;
                            k++;
                            moved = true;
                        }
                        if (k < 3 && board[k + 1][j] === board[k][j]) {
                            board[k + 1][j] *= 2;
                            score += board[k + 1][j];
                            scoreElement.textContent = score;
                            board[k][j] = 0;
                            moved = true;
                        }
                    }
                }
            }
            return moved;
        }

        // Движение плиток влево
        function moveLeft() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                for (let j = 1; j < 4; j++) {
                    if (board[i][j] !== 0) {
                        let k = j;
                        while (k > 0 && board[i][k - 1] === 0) {
                            board[i][k - 1] = board[i][k];
                            board[i][k] = 0;
                            k--;
                            moved = true;
                        }
                        if (k > 0 && board[i][k - 1] === board[i][k]) {
                            board[i][k - 1] *= 2;
                            score += board[i][k - 1];
                            scoreElement.textContent = score;
                            board[i][k] = 0;
                            moved = true;
                        }
                    }
                }
            }
            return moved;
        }

        // Движение плиток вправо
        function moveRight() {
            let moved = false;
            for (let i = 0; i < 4; i++) {
                for (let j = 2; j >= 0; j--) {
                    if (board[i][j] !== 0) {
                        let k = j;
                        while (k < 3 && board[i][k + 1] === 0) {
                            board[i][k + 1] = board[i][k];
                            board[i][k] = 0;
                            k++;
                            moved = true;
                        }
                        if (k < 3 && board[i][k + 1] === board[i][k]) {
                            board[i][k + 1] *= 2;
                            score += board[i][k + 1];
                            scoreElement.textContent = score;
                            board[i][k] = 0;
                            moved = true;
                        }
                    }
                }
            }
            return moved;
        }

        // Проверка на окончание игры
        function isGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        return false;
                    }
                    if (j < 3 && board[i][j] === board[i][j + 1]) {
                        return false;
                    }
                    if (i < 3 && board[i][j] === board[i + 1][j]) {
                        return false;
                    }
                }
            }
            return true;
        }

        // Обработка нажатий клавиш
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    handleMove('up');
                    break;
                case 'ArrowDown':
                    handleMove('down');
                    break;
                case 'ArrowLeft':
                    handleMove('left');
                    break;
                case 'ArrowRight':
                    handleMove('right');
                    break;
            }
        });

        // Запуск игры
        initGame();
    </script>
</body>
</html>
