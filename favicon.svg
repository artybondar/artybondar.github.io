<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Неоновый градиент -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7000FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00E5;stop-opacity:1" />
    </linearGradient>
    
    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Тёмный фон с сеткой -->
  <rect width="120" height="120" rx="20" fill="#0A0A0F"/>
  
  <!-- Микросхема / печатная плата -->
  <g opacity="0.15">
    <line x1="0" y1="30" x2="120" y2="30" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="120" y2="90" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="30" y1="0" x2="30" y2="120" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="120" stroke="#00F0FF" stroke-width="0.5"/>
    <line x1="90" y1="0" x2="90" y2="120" stroke="#00F0FF" stroke-width="0.5"/>
  </g>
  
  <!-- Шестигранник (hi-tech элемент) -->
  <polygon points="60,22 93,41 93,79 60,98 27,79 27,41" 
           fill="none" stroke="url(#neonGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Внутренний шестигранник -->
  <polygon points="60,34 84,48 84,72 60,86 36,72 36,48" 
           fill="none" stroke="url(#neonGrad)" stroke-width="1" opacity="0.6"/>
  
  <!-- Центральный процессор / ядро -->
  <rect x="48" y="48" width="24" height="24" rx="3" 
        fill="none" stroke="#00F0FF" stroke-width="1.5" filter="url(#glowStrong)"/>
  <rect x="52" y="52" width="16" height="16" rx="1" fill="#00F0FF" opacity="0.3"/>
  
  <!-- Точки контактов -->
  <circle cx="60" cy="22" r="3" fill="#FF00E5" filter="url(#glowStrong)"/>
  <circle cx="93" cy="41" r="2.5" fill="#7000FF" filter="url(#glow)"/>
  <circle cx="93" cy="79" r="2.5" fill="#00F0FF" filter="url(#glow)"/>
  <circle cx="60" cy="98" r="2.5" fill="#7000FF" filter="url(#glow)"/>
  <circle cx="27" cy="79" r="2.5" fill="#00F0FF" filter="url(#glow)"/>
  <circle cx="27" cy="41" r="2.5" fill="#FF00E5" filter="url(#glow)"/>
  
  <!-- Декоративные элементы "дорожки" -->
  <line x1="60" y1="25" x2="60" y2="48" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
  <line x1="75" y1="39" x2="72" y2="48" stroke="#7000FF" stroke-width="1" opacity="0.5"/>
  <line x1="75" y1="81" x2="72" y2="72" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="39" x2="48" y2="48" stroke="#FF00E5" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="81" x2="48" y2="72" stroke="#7000FF" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="95" x2="60" y2="72" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Сканирующая линия -->
  <line x1="36" y1="60" x2="84" y2="60" stroke="#00F0FF" stroke-width="1" opacity="0.8" filter="url(#glow)">
    <animate attributeName="y1" values="34;86" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="34;86" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Пульсирующая точка в центре -->
  <circle cx="60" cy="60" r="4" fill="#00F0FF" filter="url(#glowStrong)">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
